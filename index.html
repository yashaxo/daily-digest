<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Digest — Setting Up</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 2rem;
        }
        .box {
            max-width: 480px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 3rem 2rem;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #8b949e; line-height: 1.7; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="box">
        <h1>&#128240;</h1>
        <h1>Daily Digest</h1>
        <p>Your digest is being set up. Once the GitHub Actions workflow runs for
        the first time, this page will be replaced with your personalised daily
        news brief.</p>
        <p>Come back tomorrow &mdash; or trigger the workflow manually from your
        GitHub repository's Actions tab.</p>
    </div>
</body>
</html>
